name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  test:
    runs-on: windows-latest
    name: Test & Validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-test-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-cargo-

      - name: Install frontend dependencies
        run: npm install

      - name: TypeScript & Svelte type check
        run: npm run check

      - name: Rust tests (layout validation + KLC generation)
        working-directory: src-tauri
        run: cargo test

      - name: Rust linting
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            rust-target: x86_64-pc-windows-msvc
            tauri-args: --target x86_64-pc-windows-msvc
          - arch: arm64
            rust-target: aarch64-pc-windows-msvc
            tauri-args: --target aarch64-pc-windows-msvc

    runs-on: windows-latest
    name: Build (${{ matrix.arch }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build -- ${{ matrix.tauri-args }}

      - name: Build portable ZIP
        env:
          TAURI_TARGET_TRIPLE: ${{ matrix.rust-target }}
        run: node scripts/build-portable.mjs

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.rust-target }}/release/bundle/portable/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout for release notes
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Resolve release notes path
        id: notes
        shell: bash
        run: |
          NOTES="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES" ]; then
            echo "Using custom release notes: $NOTES"
            echo "path=$NOTES" >> "$GITHUB_OUTPUT"
          else
            echo "No custom notes at $NOTES, falling back to auto-generated."
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
